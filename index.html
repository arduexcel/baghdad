<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هێلی بغداد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; }
        .num-card { transition: all 0.2s; cursor: pointer; }
        .bg-red-custom { background-color: #ef4444 !important; color: white; }
        .bg-yellow-custom { background-color: #facc15 !important; color: black; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="login-section" class="fixed inset-0 flex items-center justify-center z-50 bg-slate-900 hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-80 text-center">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">چوونەژوورەوە</h2>
            <input type="text" id="username" placeholder="ناو" class="w-full p-3 mb-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-center">
            <input type="password" id="password" placeholder="پاسۆرد" class="w-full p-3 mb-6 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-center" onkeypress="if(event.key === 'Enter') checkLogin()">
            <button onclick="checkLogin()" class="bg-blue-600 text-white font-bold py-3 rounded-lg w-full transition hover:bg-blue-700">داخلبوون</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="bg-white border-b p-4 sticky top-0 z-10 shadow-sm flex flex-wrap gap-3 justify-between items-center">
            <div class="flex flex-wrap gap-2">
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-red-600 shadow">چوونە دەرەوە</button>
                <button onclick="resetColors()" class="bg-gray-200 px-4 py-2 rounded-lg font-medium text-sm">ڕیسێتی ڕەنگ</button>
                <button onclick="saveDailyReport()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-medium text-sm">خەزنی ڕاپۆرت</button>
                <button onclick="showReportModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium text-sm">ئەرشیف</button>
            </div>
            
            <button onclick="openAddNumberModal()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-md hover:bg-blue-700">+ زیادکردنی ژمارە</button>

            <div class="flex items-center gap-2 border-r pr-4">
                <span id="user-display" class="font-bold text-blue-700 text-lg"></span>
            </div>
        </header>

        <main class="p-4 max-w-6xl mx-auto">
            <div id="numbers-container" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-3"></div>
        </main>
    </div>

    <div id="add-num-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-xs shadow-xl border-t-8 border-blue-600">
            <h3 class="text-xl font-bold mb-4 text-center text-gray-800">زیادکردنی بەردەوام</h3>
            <p class="text-xs text-gray-500 text-center mb-4">ژمارەکە بنوسە و Enter دابگرە</p>
            <input type="text" id="new-num-input" placeholder="ژمارە" 
                   class="w-full p-3 border rounded-xl mb-4 text-center text-2xl font-bold outline-none focus:ring-2 focus:ring-blue-500"
                   onkeypress="if(event.key === 'Enter') addNewNumber()">
            <div class="flex flex-col gap-2">
                <button onclick="addNewNumber()" class="bg-blue-600 text-white w-full py-3 rounded-xl font-bold">زیادکردن</button>
                <button onclick="closeAddNumberModal()" class="bg-gray-100 text-gray-500 w-full py-2 rounded-xl font-bold text-sm">تەواو / داخستن</button>
            </div>
        </div>
    </div>

    <div id="action-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-xs text-center shadow-xl border-t-8 border-blue-500">
            <h3 class="text-xl font-bold mb-6 text-gray-800">ژمارەی <span id="selected-num-text" class="text-blue-600"></span></h3>
            <button onclick="markAs('red')" class="bg-red-500 text-white w-full py-4 mb-3 rounded-xl font-bold shadow-lg">ڕۆشتوو (سوور)</button>
            <button onclick="markAs('yellow')" class="bg-yellow-400 text-black w-full py-4 mb-3 rounded-xl font-bold shadow-lg">ئامادەبوون (زەرد)</button>
            <button onclick="deleteNumber()" class="text-red-400 text-sm mb-4 block mx-auto hover:underline">سڕینەوە</button>
            <button onclick="closeModal()" class="text-gray-400 mt-2">داخستن</button>
        </div>
    </div>

    <div id="report-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-2xl h-[80vh] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-xl font-bold text-gray-800">ئەرشیفی ڕاپۆرتەکان</h3>
                <div class="flex gap-2">
                    <input type="date" id="search-date" class="border p-2 rounded-lg outline-none">
                    <button onclick="fetchReport()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">گەڕان</button>
                </div>
            </div>
            <div id="report-result" class="flex-grow overflow-y-auto bg-gray-50 rounded-lg p-4 text-right"></div>
            <button onclick="closeReport()" class="mt-4 bg-gray-800 text-white py-3 rounded-xl">داخستن</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB4a54uDYvFfwOWXwrc1M6CLggRvPmS_ek",
            authDomain: "coffee-spark-ai-barista-26782.firebaseapp.com",
            projectId: "coffee-spark-ai-barista-26782",
            databaseURL: "https://coffee-spark-ai-barista-26782-default-rtdb.firebaseio.com",
            storageBucket: "coffee-spark-ai-barista-26782.firebasestorage.app",
            messagingSenderId: "620734694966",
            appId: "1:620734694966:web:df40621d0ef564bbf67a97"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = localStorage.getItem('sparkUser') || "";
        let selectedIndex = null;
        let numbersList = [];
        const validUsers = { "هونه‌ر": "0055", "كامه‌ران": "0066", "نه‌وشیروان": "0077", "مه‌ریوان": "0088" };

        window.onload = function() {
            if (currentUser && validUsers[currentUser]) {
                showMain();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
            }
        };

        function checkLogin() {
            let u = document.getElementById('username').value.trim();
            let p = document.getElementById('password').value.trim();
            if (validUsers[u] === p) {
                currentUser = u;
                localStorage.setItem('sparkUser', u);
                showMain();
            } else { alert("ناو یان پاسۆرد هەڵەیە!"); }
        }

        function showMain() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser;
            listenToLiveChanges();
        }

 function logout() {
    // ١. سڕینەوەی ناوی بەکارهێنەر لەناو میمۆری وێبگەڕ
    localStorage.clear(); 
    sessionStorage.clear();
    currentUser = "";
    
    // ٢. نیشاندانی شاشەی لۆگین و شاردنەوەی بەشە پڕۆگرامەکە
    document.getElementById('main-content').classList.add('hidden');
    document.getElementById('login-section').classList.remove('hidden');
    
    // ٣. پاککردنەوەی ئینپوتەکان
    document.getElementById('username').value = "";
    document.getElementById('password').value = "";
    
    // ٤. تازەکردنەوەی لاپەڕەکە بۆ دڵنیایی تەواو
    window.location.reload();
}

        function listenToLiveChanges() {
            db.ref('live_data/current_list').on('value', (snapshot) => {
                const data = snapshot.val();
                numbersList = data ? data : [];
                renderNumbers();
            });
        }

        function renderNumbers() {
            const container = document.getElementById('numbers-container');
            container.innerHTML = '';
            numbersList.forEach((item, index) => {
                let div = document.createElement('div');
                let colorClass = item.status === 'red' ? 'bg-red-custom shadow-md' : item.status === 'yellow' ? 'bg-yellow-custom shadow-md' : 'bg-white text-gray-700 border border-gray-200';
                div.className = `p-4 rounded-xl font-bold text-center num-card transition transform active:scale-95 shadow-sm ${colorClass}`;
                div.innerText = item.val;
                div.onclick = () => openModal(index);
                container.appendChild(div);
            });
        }

        function openAddNumberModal() { 
            document.getElementById('add-num-modal').classList.remove('hidden'); 
            document.getElementById('new-num-input').focus(); 
        }

        function closeAddNumberModal() { 
            document.getElementById('add-num-modal').classList.add('hidden'); 
            document.getElementById('new-num-input').value = "";
        }

        // --- ئەوەی گۆڕاوە لێرەدایە ---
        function addNewNumber() {
            let val = document.getElementById('new-num-input').value.trim();
            if (!val) return;
            numbersList.push({ val: val, status: 'none', addedBy: currentUser });
            updateFirebaseLive();
            
            // ویندۆکە داناخرێت، تەنها شوێنەکە پاک دەبێتەوە بۆ ژمارەی داهاتوو
            document.getElementById('new-num-input').value = "";
            document.getElementById('new-num-input').focus();
        }

        function openModal(index) {
            selectedIndex = index;
            document.getElementById('selected-num-text').innerText = numbersList[index].val;
            document.getElementById('action-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('action-modal').classList.add('hidden'); }

        function markAs(status) {
            if (status === 'red') {
                let item = numbersList.splice(selectedIndex, 1)[0];
                item.status = 'red';
                item.modifiedBy = currentUser;
                numbersList.push(item);
            } else {
                numbersList[selectedIndex].status = 'yellow';
                numbersList[selectedIndex].modifiedBy = currentUser;
            }
            updateFirebaseLive();
            closeModal();
        }

        function resetColors() {
            if(confirm("ئایا دڵنیای لە سڕینەوەی ڕەنگەکان؟")) {
                numbersList.forEach(n => n.status = 'none');
                updateFirebaseLive();
            }
        }

        function deleteNumber() {
            if(confirm("ئەم ژمارەیە بسڕێتەوە؟")) {
                numbersList.splice(selectedIndex, 1);
                updateFirebaseLive();
                closeModal();
            }
        }

        function updateFirebaseLive() {
            db.ref('live_data/current_list').set(numbersList);
        }

        function saveDailyReport() {
            const today = new Date().toLocaleDateString('en-CA');
            db.ref('reports/' + today).set({
                date: today,
                savedBy: currentUser,
                data: numbersList,
                saveTime: new Date().toLocaleTimeString()
            }).then(() => alert("ڕاپۆرتی ئەمڕۆ خەزن کرا لەلایەن: " + currentUser));
        }

        function showReportModal() { document.getElementById('report-modal').classList.remove('hidden'); }
        function closeReport() { document.getElementById('report-modal').classList.add('hidden'); }

        function fetchReport() {
            let date = document.getElementById('search-date').value;
            if(!date) return alert("بەروار دیاری بکە");
            db.ref('reports/' + date).once('value', (snapshot) => {
                const data = snapshot.val();
                let resDiv = document.getElementById('report-result');
                if (data) {
                    resDiv.innerHTML = `
                        <div class="mb-4 bg-blue-50 p-4 rounded-xl border-r-4 border-blue-500 text-sm">
                            <p><strong>بەروار:</strong> ${data.date}</p>
                            <p><strong>خەزنکراوە لەلایەن:</strong> ${data.savedBy}</p>
                            <p><strong>کات:</strong> ${data.saveTime}</p>
                        </div>
                        <div class='grid grid-cols-4 sm:grid-cols-6 gap-2'>` +
                        data.data.map(n => `<span class='p-2 border rounded-lg text-center font-bold text-xs ${n.status === 'red' ? 'bg-red-500 text-white' : n.status === 'yellow' ? 'bg-yellow-300' : 'bg-white'}'>${n.val}</span>`).join('') + "</div>";
                } else {
                    resDiv.innerHTML = "<p class='text-center text-gray-500 mt-10'>ڕاپۆرت نەدۆزرایەوە.</p>";
                }
            });
        }
    </script>
</body>
</html>
